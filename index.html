<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test Debug PDF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <div id="zone-test" style="padding: 20px; border: 2px solid pink; text-align: center;">
    <h1>HELLO WORLD</h1>
    <p>Ceci est un test de debug pour iPhone.</p>
    <p>Date : <span id="date-test"></span></p>
  </div>

  <br>

  <button onclick="testerPDF()" style="padding: 20px; width: 100%; background: #ef5da8; color: white; font-size: 20px; border-radius: 10px;">
    CLIQUER ICI POUR TESTER LE PDF
  </button>

  <script>
    document.getElementById('date-test').innerText = new Date().toLocaleString();

    function testerPDF() {
      const element = document.getElementById('zone-test');
      
      const options = {
        margin: 10,
        filename: 'test-debug.pdf',
        image: { type: 'jpeg', quality: 0.95 },
        html2canvas: { scale: 1, useCORS: true }, // Echelle 1 pour être le plus léger possible
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      // On lance la génération
      html2pdf().set(options).from(element).save();
    }
  </script>

</body>
</html>
