<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Secrets de banquière - Patrimoine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #fff5f9; --card: #ffffff; --text: #17151f; --muted: #68657a;
      --accent: #ef5da8; --border: #f0e4ef; --ok: #0f9d58; --warn: #d93025;
      --shadow: 0 10px 30px rgba(35, 10, 30, .06);
      --font: 'Inter', sans-serif;
      --c-actif: #bafce1; --c-dette: #ff9ca6; --c-net: #d7c3ff;
    }
    * { box-sizing: border-box; font-family: var(--font); }
    body { margin: 0; color: var(--text); background: #fff6fb; min-height: 100vh; padding: 0 16px 40px; }
    h1 { font-size: 24px; font-weight: 800; margin: 22px 0 6px; text-align: center; }
    p.intro { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 24px; }
    .wrap { max-width: 1000px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    /* GESTION DES BOUTONS SELON ECRAN */
    .show-mobile { display: none; }
    .show-pc { display: block; }

    @media (max-width: 850px) { 
      .grid { grid-template-columns: 1fr; }
      .show-mobile { display: block; }
      .show-pc { display: none; }
    }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); padding: 18px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .bar { height: 5px; width: 100%; position: absolute; top: 0; left: 0; }
    .bar.actif { background: var(--c-actif); }
    .bar.dette { background: var(--c-dette); }
    .bar.net { background: var(--c-net); }
    h2 { font-size: 16px; margin: 6px 0 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .input-row { margin-bottom: 12px; }
    .input-row label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
    .input-field { display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; background: #fff; }
    .input-field input { border: 0; outline: 0; width: 100%; font-size: 14px; font-weight: 700; }
    .net-value { font-size: 34px; font-weight: 800; margin: 10px 0; text-align: center; }
    .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; border-top: 1px dashed var(--border); padding-top: 12px; text-align: center; }
    .btn-main { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; text-align: center; text-decoration: none; margin-top: 10px; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-copy { background: #17151f; color: #fff; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .ig { text-align: center; font-size: 11px; margin-top: 20px; }
    .ig a { color: var(--text); text-decoration: none; font-weight: 700; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Mon Patrimoine Net</h1>
    <p class="intro">Faites l'inventaire de vos actifs et de vos dettes.</p>

    <div class="grid">
      <div class="card">
        <div class="bar actif"></div>
        <h2><i data-lucide="plus-circle"></i> Vos Actifs</h2>
        <div class="input-row"><label>Comptes bancaires</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Comptes bancaires"></div></div>
        <div class="input-row"><label>Livrets (LVA, PEL, etc.)</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Livrets"></div></div>
        <div class="input-row"><label>Investissements</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Investissements"></div></div>
        <div class="input-row"><label>Immobilier</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Immobilier"></div></div>
        <div class="input-row"><label>Véhicules / Autres</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Autres actifs"></div></div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 16px;">
        <div class="card">
          <div class="bar dette"></div>
          <h2><i data-lucide="minus-circle"></i> Vos Dettes</h2>
          <div class="input-row"><label>Crédit immo</label><div class="input-field"><span>€</span><input type="number" class="d-in" data-n="Crédit immo"></div></div>
          <div class="input-row"><label>Autres dettes</label><div class="input-field"><span>€</span><input type="number" class="d-in" data-n="Autres dettes"></div></div>
        </div>

        <div class="card">
          <div class="bar net"></div>
          <h2>Patrimoine NET</h2>
          <div class="net-value ok" id="vNet">0 €</div>
          <div class="summary">
            <div><small>BRUT</small><br><b id="vBrut">0 €</b></div>
            <div><small>DETTES</small><br><b id="vDette" class="warn">0 €</b></div>
          </div>

          <button class="btn-main btn-accent show-pc" onclick="exportPDF()">Exporter en PDF</button>
          
          <button class="btn-main btn-copy show-mobile" onclick="copyToClipboard()">Copier mon bilan (Texte)</button>

          <button style="background:none; border:none; color:var(--muted); font-size:10px; cursor:pointer; margin-top:10px;" onclick="location.reload()">Réinitialiser</button>
        </div>
      </div>
    </div>
    <div class="ig"><a href="https://www.instagram.com/secrets_de_banquiere/" target="_blank">@secrets_de_banquiere</a></div>
  </div>

  <script>
    lucide.createIcons();
    const aIn = document.querySelectorAll('.a-in');
    const dIn = document.querySelectorAll('.d-in');
    function f(n) { return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n); }

    function calc() {
      let b=0, d=0;
      aIn.forEach(i => b += Number(i.value)||0);
      dIn.forEach(i => d += Number(i.value)||0);
      vBrut.innerText = f(b); vDette.innerText = f(d); vNet.innerText = f(b-d);
      vNet.className = 'net-value ' + (b-d>=0?'ok':'warn');
    }
    [...aIn, ...dIn].forEach(i => i.addEventListener('input', calc));

    // FONCTION PC : EXPORT PDF AVEC LIEN
    function exportPDF() {
      const date = new Date().toLocaleDateString('fr-FR');
      let html = `<div style="padding:30px; font-family:sans-serif;">
        <center><h1 style="color:#ef5da8;">Bilan Patrimoine</h1><p>${date}</p></center>
        <div style="background:#fdf2f7; padding:20px; border-radius:10px; text-align:center; margin:20px 0;">
          <p>PATRIMOINE NET</p><h2 style="font-size:30px;">${vNet.innerText}</h2>
          <p>Brut: ${vBrut.innerText} | Dettes: ${vDette.innerText}</p>
        </div>
        <div style="margin-top:30px; text-align:center;">
          <a href="https://theleme.netlify.app/" style="display:inline-block; padding:15px 25px; background:#17151f; color:#fff; text-decoration:none; border-radius:10px; font-weight:bold;">
            Découvrir la méthode 5/15 →
          </a>
        </div>
      </div>`;
      html2pdf().from(html).set({ margin:10, filename:'mon-patrimoine.pdf' }).save();
    }

    // FONCTION IPHONE : COPIER EN TEXTE SIMPLE
    function copyToClipboard() {
      let txt = `MON BILAN PATRIMOINE\n`;
      txt += `--------------------------\n`;
      txt += `PATRIMOINE NET : ${vNet.innerText}\n`;
      txt += `Patrimoine Brut : ${vBrut.innerText}\n`;
      txt += `Total Dettes : ${vDette.innerText}\n\n`;
      txt += `DÉTAILS ACTIFS :\n`;
      aIn.forEach(i => { if(i.value > 0) txt += `- ${i.dataset.n} : ${f(i.value)}\n`; });
      txt += `\nDÉTAILS DETTES :\n`;
      dIn.forEach(i => { if(i.value > 0) txt += `- ${i.dataset.n} : ${f(i.value)}\n`; });
      txt += `\nOptimisez vos finances ici : https://theleme.netlify.app/`;

      navigator.clipboard.writeText(txt).then(() => {
        alert("Bilan copié ! Vous pouvez le coller dans vos Notes ou par message.");
      });
    }
  </script>
</body>
</html>
