<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Secrets de banquière - Patrimoine Net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #fff5f9; --card: #ffffff; --text: #17151f; --muted: #68657a;
      --accent: #ef5da8; --border: #f0e4ef; --ok: #0f9d58; --warn: #d93025;
      --shadow: 0 10px 30px rgba(35, 10, 30, .06);
      --font: 'Inter', sans-serif;
      --c-actif: #bafce1; --c-dette: #ff9ca6; --c-net: #d7c3ff;
    }
    * { box-sizing: border-box; font-family: var(--font); }
    body { margin: 0; background: #fff; color: var(--text); background-attachment: fixed; min-height: 100vh; background: linear-gradient(180deg,#fff 0%,#ffe9f1 100%); }
    h1 { font-size: 24px; font-weight: 800; margin: 22px 0 6px; text-align: center; }
    p.intro { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 24px; padding: 0 10px; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 0 16px 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); padding: 18px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .bar { height: 5px; width: 100%; position: absolute; top: 0; left: 0; }
    .bar.actif { background: var(--c-actif); }
    .bar.dette { background: var(--c-dette); }
    .bar.net { background: var(--c-net); }
    h2 { font-size: 16px; margin: 6px 0 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; }
    h2 i { width: 14px; height: 14px; }
    .input-row { margin-bottom: 12px; }
    .input-row label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
    .input-field { display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); border-radius: 10px; padding: 10px; background: #fff; }
    .input-field input { border: 0; outline: 0; width: 100%; font-size: 15px; font-weight: 700; color: var(--text); }
    .result-box { text-align: center; }
    .net-value { font-size: 34px; font-weight: 800; margin: 10px 0; }
    .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; border-top: 1px dashed var(--border); padding-top: 12px; }
    .summary b { display: block; font-size: 15px; }
    .summary small { font-size: 9px; text-transform: uppercase; color: var(--muted); font-weight: 800; }
    .btn-main { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; background: var(--accent); color: #fff; text-decoration: none; margin-top: 10px; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .ig { text-align: center; font-size: 11px; margin-top: 20px; }
    .ig a { color: var(--text); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Mon Patrimoine Net</h1>
    <p class="intro">Faites l'inventaire de vos actifs et dettes pour connaître votre richesse réelle.</p>
    <div class="grid">
      <div class="card">
        <div class="bar actif"></div>
        <h2>Vos Actifs</h2>
        <div class="input-row"><label>Comptes bancaires</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Comptes bancaires"></div></div>
        <div class="input-row"><label>Livrets d'épargne</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Livrets"></div></div>
        <div class="input-row"><label>Investissements (PEA, AV...)</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Investissements"></div></div>
        <div class="input-row"><label>Immobilier</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Immobilier"></div></div>
        <div class="input-row"><label>Autres (Crypto, Véhicules...)</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Autres"></div></div>
      </div>
      <div class="card">
        <div class="bar dette"></div>
        <h2>Vos Dettes</h2>
        <div class="input-row"><label>Prêt Immobilier</label><div class="input-field"><span>€</span><input type="number" class="d-in" data-n="Crédit immobilier"></div></div>
        <div class="input-row"><label>Crédit Conso / Auto</label><div class="input-field"><span>€</span><input type="number" class="d-in" data-n="Crédits"></div></div>
        <div class="input-row"><label>Autres Dettes</label><div class="input-field"><span>€</span><input type="number" class="d-in" data-n="Autres dettes"></div></div>
        <div class="card result-box" style="margin-top:20px; box-shadow:none; border:none; padding:0;">
            <div class="net-value ok" id="vNet">0 €</div>
            <div class="summary">
                <div><small>Brut</small><b id="vBrut">0 €</b></div>
                <div><small>Dettes</small><b id="vDette" class="warn">0 €</b></div>
            </div>
            <button class="btn-main" onclick="exportPDF()">Exporter mon bilan (PDF)</button>
        </div>
      </div>
    </div>
    <div class="ig"><a href="https://www.instagram.com/secrets_de_banquiere/" target="_blank">@secrets_de_banquiere</a></div>
  </div>

  <script>
    lucide.createIcons();
    const aIn = document.querySelectorAll('.a-in');
    const dIn = document.querySelectorAll('.d-in');
    const f = (n) => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);

    function calc() {
      let b=0, d=0;
      aIn.forEach(i => b += Number(i.value)||0);
      dIn.forEach(i => d += Number(i.value)||0);
      let n = b - d;
      vBrut.innerText = f(b); vDette.innerText = f(d); vNet.innerText = f(n);
      vNet.className = 'net-value ' + (n>=0?'ok':'warn');
    }
    [...aIn, ...dIn].forEach(i => i.addEventListener('input', calc));

    function exportPDF() {
      const date = new Date().toLocaleDateString('fr-FR');
      const valNet = vNet.innerText;
      const colorN = vNet.classList.contains('ok') ? '#0f9d58' : '#d93025';

      // STRUCTURE PDF ULTRA LEGERE (SANS IMAGES EXTERNES NI GRILLES COMPLEXES)
      let bodyHtml = `
        <div style="font-family: Arial, sans-serif; padding: 20px;">
          <h1 style="color:#ef5da8; text-align:center; font-size:22px;">Bilan Patrimoine</h1>
          <p style="text-align:center; color:#666; font-size:12px;">Secrets de Banquière - ${date}</p>
          
          <div style="background:#fff5f9; border:1px solid #f0e4ef; border-radius:10px; padding:20px; margin:20px 0; text-align:center;">
            <p style="margin:0; font-size:10px; color:#666; font-weight:bold;">PATRIMOINE NET</p>
            <div style="font-size:32px; font-weight:bold; color:${colorN}; margin:10px 0;">${valNet}</div>
            <p style="margin:0; font-size:12px;">Brut: ${vBrut.innerText} | Dettes: ${vDette.innerText}</p>
          </div>

          <table width="100%" style="margin-top:20px;">
            <tr>
              <td width="50%" valign="top">
                <b style="color:#ef5da8; font-size:12px;">ACTIFS</b><br><br>
                ${Array.from(aIn).filter(i=>i.value>0).map(i=>`<div style="font-size:11px; margin-bottom:5px;">• ${i.dataset.n}: <b>${f(i.value)}</b></div>`).join('') || 'Aucun'}
              </td>
              <td width="50%" valign="top">
                <b style="color:#ef5da8; font-size:12px;">DETTES</b><br><br>
                ${Array.from(dIn).filter(i=>i.value>0).map(i=>`<div style="font-size:11px; margin-bottom:5px;">• ${i.dataset.n}: <b>${f(i.value)}</b></div>`).join('') || 'Aucune'}
              </td>
            </tr>
          </table>

          <div style="margin-top:40px; text-align:center; font-size:12px; color:#ef5da8; font-weight:bold;">
            Retrouvez-moi sur Instagram : @secrets_de_banquiere
          </div>
        </div>`;

      const opt = {
        margin: 10,
        filename: 'mon-patrimoine.pdf',
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(opt).from(bodyHtml).save();
    }
  </script>
</body>
</html>
