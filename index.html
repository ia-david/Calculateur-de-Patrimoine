<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Secrets de banquière - Patrimoine Net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #fff5f9; --card: #ffffff; --text: #17151f; --muted: #68657a;
      --accent: #ef5da8; --border: #f0e4ef; --ok: #0f9d58; --warn: #d93025;
      --shadow: 0 10px 30px rgba(35, 10, 30, .06);
      --font: 'Inter', sans-serif;
      --c-actif: #bafce1; --c-dette: #ff9ca6; --c-net: #d7c3ff;
    }

    * { box-sizing: border-box; font-family: var(--font); }
    html, body {
      margin: 0; color: var(--text);
      background: radial-gradient(1200px 400px at 70% -200px,#ffd3e9 0%,transparent 70%),
                  radial-gradient(800px 300px at 0% 0%,#ffe5f1 0%,transparent 60%),
                  linear-gradient(180deg,#fff 0%,#ffe9f1 60%,#fff6fb 100%);
      background-attachment: fixed; min-height: 100vh;
    }

    h1 { font-size: 24px; font-weight: 800; margin: 22px 0 6px; text-align: center; }
    p.intro { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 24px; }

    /* Correction Mobile : Padding pour éviter que le dernier champ soit coupé */
    .wrap { max-width: 1000px; margin: 0 auto; padding: 0 16px 80px; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: stretch; }
    
    .btn-mobile { display: none; background: #17151f !important; color: white !important; }

    @media (max-width: 850px) { 
      .grid { grid-template-columns: 1fr; }
      .btn-pdf { display: none !important; } 
      .btn-mobile { display: inline-block !important; }
    }

    .card { 
      background: var(--card); border: 1px solid var(--border); border-radius: 16px; 
      box-shadow: var(--shadow); padding: 18px; position: relative; overflow: hidden;
      display: flex; flex-direction: column; height: 100%;
    }
    .bar { height: 5px; width: 100%; position: absolute; top: 0; left: 0; }
    .bar.actif { background: var(--c-actif); }
    .bar.dette { background: var(--c-dette); }
    .bar.net { background: var(--c-net); }
    
    h2 { font-size: 16px; margin: 6px 0 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .input-row { margin-bottom: 12px; }
    .input-row label { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
    .input-field { display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; background: #fff; box-shadow: var(--shadow); }
    .input-field input { border: 0; outline: 0; width: 100%; font-size: 14px; font-weight: 700; background: transparent; }

    .result-box { text-align: center; }
    .net-value { font-size: 34px; font-weight: 800; margin: 10px 0; }
    .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; border-top: 1px dashed var(--border); padding-top: 12px; }
    .summary b { display: block; font-size: 15px; }
    .summary small { font-size: 9px; text-transform: uppercase; color: var(--muted); font-weight: 800; }

    .btn-main { display: inline-block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; font-size: 14px; cursor: pointer; transition: .2s ease; text-decoration: none; text-align: center; }
    .btn-accent { background: var(--accent); color: #fff; margin-top: 5px; box-shadow: var(--shadow); }

    .contact-link { display: block; text-align: center; margin: 20px auto 5px; }
    a.cta-final { text-decoration: none; background: var(--accent); color: #fff; padding: 12px 16px; border-radius: 12px; font-weight: 800; display: inline-block; font-size: 14px; }

    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .ig { text-align: center; font-size: 11px; margin-top: 10px; }
    .ig a { color: var(--text); text-decoration: none; font-weight: 700; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Mon Patrimoine Net</h1>
    <p class="intro">Faites l'inventaire de vos actifs et de vos dettes.</p>

    <div class="grid">
      <div class="card">
        <div class="bar actif"></div>
        <h2><i data-lucide="plus-circle"></i> Vos Actifs</h2>
        <div class="input-row"><label>Comptes bancaires</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Comptes bancaires"></div></div>
        <div class="input-row"><label>Livrets</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Livrets"></div></div>
        <div class="input-row"><label>Investissements</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Investissements"></div></div>
        <div class="input-row"><label>Immobilier</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Immobilier"></div></div>
        <div class="input-row"><label>Véhicules</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Véhicules"></div></div>
        <div class="input-row"><label>Autres actifs</label><div class="input-field"><span>€</span><input type="number" class="a-in" data-n="Autres actifs"></div></div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 16px;">
        <div class="card">
          <div class="bar dette"></div>
          <h2><i data-lucide="minus-circle"></i> Vos Dettes</h2>
          <div class="input-row"><label>Crédit immobilier</label><div class="input-field"><span>€</span><input type="number" class="d-in" data-n="Crédit immobilier"></div></div>
          <div class="input-row"><label>Crédit conso</label><div class="input-field"><span>€</span><input type="number" class="d-in" data-n="Crédit conso"></div></div>
          <div class="input-row"><label>Autres dettes</label><div class="input-field"><span>€</span><input type="number" class="d-in" data-n="Autres dettes"></div></div>
        </div>

        <div class="card result-box">
          <div class="bar net"></div>
          <h2>Votre Patrimoine NET</h2>
          <div class="net-value ok" id="vNet">0 €</div>
          <div class="summary">
            <div><small>Brut</small><b id="vBrut">0 €</b></div>
            <div><small>Dettes</small><b id="vDette" class="warn">0 €</b></div>
          </div>
          
          <button class="btn-main btn-accent btn-pdf" onclick="exportPDF()">Exporter en PDF</button>
          <button class="btn-main btn-mobile" onclick="copyBilan()">Copier mon bilan (Texte)</button>
          
          <button style="background:none; border:none; color:var(--muted); font-size:10px; cursor:pointer; margin-top:10px;" onclick="location.reload()">Réinitialiser</button>
        </div>
      </div>
    </div>
    <div class="contact-link"><a href="https://ig.me/m/secrets_de_banquiere" target="_blank" class="cta-final">Contactez‑moi</a></div>
    <div class="ig"><a href="https://www.instagram.com/secrets_de_banquiere/" target="_blank">@secrets_de_banquiere</a></div>
  </div>

  <script>
    lucide.createIcons();
    const aIn = document.querySelectorAll('.a-in');
    const dIn = document.querySelectorAll('.d-in');
    function f(n) { return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n); }

    function calc() {
      let b=0, d=0;
      aIn.forEach(i => b += Number(i.value)||0);
      dIn.forEach(i => d += Number(i.value)||0);
      vBrut.innerText = f(b); vDette.innerText = f(d); vNet.innerText = f(b-d);
      vNet.className = 'net-value ' + (b-d>=0?'ok':'warn');
    }
    [...aIn, ...dIn].forEach(i => i.addEventListener('input', calc));

    function copyBilan() {
      let t = `MON BILAN PATRIMOINE\nNET : ${vNet.innerText}\nBrut : ${vBrut.innerText}\nDettes : ${vDette.innerText}\n\nOptimisez vos finances : https://theleme.netlify.app/`;
      navigator.clipboard.writeText(t);
      alert("Bilan copié !");
    }

    function exportPDF() {
      const date = new Date().toLocaleDateString('fr-FR');
      let pdfContent = `
        <div style="font-family:sans-serif; padding:30px; color:#17151f;">
          <center>
            <h1 style="color:#ef5da8; margin:0;">Bilan de Patrimoine</h1>
            <p style="color:#68657a; font-size:12px;">${date}</p>
            <div style="background:#fff5f9; padding:20px; border-radius:15px; border:1px solid #f0e4ef; margin:20px 0;">
                <p style="font-size:10px; text-transform:uppercase; margin:0;">Patrimoine Net Total</p>
                <h2 style="font-size:32px; color:${vNet.classList.contains('ok')?'#0f9d58':'#d93025'}; margin:10px 0;">${vNet.innerText}</h2>
                <p>Brut: ${vBrut.innerText} | Dettes: ${vDette.innerText}</p>
            </div>
          </center>
          <div style="margin-top:30px; text-align:center;">
            <a href="https://theleme.netlify.app/" style="display:inline-block; padding:15px 30px; background:#ef5da8; color:#ffffff; border-radius:12px; text-decoration:none; font-size:14px; font-weight:bold; box-shadow: 0 4px 10px rgba(239, 93, 168, 0.3);">
              DÉCOUVRIR LA MÉTHODE 5/15 →
            </a>
            <p style="font-size:10px; color:#68657a; margin-top:10px;">Cliquez sur le bouton pour optimiser votre patrimoine</p>
          </div>
        </div>`;

      html2pdf().from(pdfContent).set({
        margin: 10,
        filename: `Patrimoine_${date}.pdf`,
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).save();
    }
  </script>
</body>
</html>
